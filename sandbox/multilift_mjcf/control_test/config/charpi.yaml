# charpi drone — control / PID parameters, transcribed verbatim from the PX4 SITL
# airframe (real-vehicle charpi.params). Loaded by the control tests via
# --drone_config to ALIGN the sim controller with PX4 SITL / the real aircraft.
#
# Mapping: attitude -> PX4AttitudeControlCfg, position -> PX4PositionControlCfg,
# rate -> DroneControlCfg (the ported isaac_dreamer body-rate stack).

attitude:                      # mc_att_control
  roll_p: 6.5                  # MC_ROLL_P
  pitch_p: 6.5                 # MC_PITCH_P
  yaw_p: 2.8                   # MC_YAW_P
  yaw_weight: 0.4              # MC_YAW_WEIGHT
  rollrate_max_deg: 220        # MC_ROLLRATE_MAX
  pitchrate_max_deg: 220       # MC_PITCHRATE_MAX
  yawrate_max_deg: 200         # MC_YAWRATE_MAX

rate:                          # mc_rate_control (MC_*RATE_*)  [roll, pitch, yaw]
  kp:   [0.10, 0.15, 0.20]     # MC_{ROLL,PITCH,YAW}RATE_P
  ki:   [0.15, 0.15, 0.10]     # MC_*RATE_I
  kd:   [0.0018, 0.0024, 0.0]  # MC_*RATE_D
  kk:   [0.6, 0.6, 0.5]        # MC_*RATE_K   (overall gain multiplier — was 1.0 in sim)
  k_ff: [0.0, 0.0, 0.0]        # MC_*RATE_FF
  gyro_cutoff_hz: 40           # IMU_GYRO_CUTOFF   (rate Butterworth)
  dgyro_cutoff_hz: 30          # IMU_DGYRO_CUTOFF  (rate-derivative Butterworth)
  int_lim: 0.3                 # MC_*R_INT_LIM — documented; NOTE: the ported rate
                               #   controller does not clamp its integrator yet, so
                               #   this value is not enforced (small effect on gentle
                               #   trajectories; see control_test/README.md).

position:                      # mc_pos_control (MPC_*)
  gain_pos_p: [0.95, 0.95, 1.0]   # MPC_XY_P, MPC_XY_P, MPC_Z_P
  gain_vel_p: [1.8, 1.8, 4.0]     # MPC_*_VEL_P_ACC
  gain_vel_i: [0.4, 0.4, 2.0]     # MPC_*_VEL_I_ACC
  gain_vel_d: [0.2, 0.2, 0.0]     # MPC_*_VEL_D_ACC
  lim_vel_horizontal: 12.0        # MPC_XY_VEL_MAX
  lim_vel_up: 3.0                 # MPC_Z_VEL_MAX_UP
  lim_vel_down: 1.5               # MPC_Z_VEL_MAX_DN
  lim_thr_min: 0.12               # MPC_THR_MIN
  lim_thr_max: 1.0                # MPC_THR_MAX
  lim_thr_xy_margin: 0.3          # MPC_THR_XY_MARG
  tilt_max_deg: 45.0              # MPC_TILTMAX_AIR
  hover_thrust: 0.26              # MPC_THR_HOVER
