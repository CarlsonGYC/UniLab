# @package _global_
# Cable-lift multilift fixed-point hover (MuJoCo). PPO hyper-params mirror direct_rl's skrl cfg.
training:
  task_name: MultiliftHover
  sim_backend: mujoco
  render_spacing: 8.0
env:
  # exposed env knobs — override directly on the CLI (e.g. env.curriculum_steps=50000)
  curriculum_enabled: true
  # progress = step_counter / curriculum_steps. Every phase is fully open by 0.90*250k = 225k control
  # steps, leaving the rest of the 1M per-env budget at full difficulty.
  curriculum_steps: 250000.0
  v_max: 0.8
  a_max: 0.8
  zero_vel_acc_cmd: true
  # vel/acc channels ramp in CONTINUOUSLY over [0.40, 0.60] of curriculum progress — the previous
  # hard gate at 0.40 shocked the policy into a 13k-iteration saturation blow-up (2026-06-30 run).
  vel_acc_enable_frac: 0.40
  vel_acc_full_frac: 0.60
  action_filter_tau: 0.5
  randomize_payload_mass: true
  randomize_payload_inertia: true   # inertia tracks mass + independent jitter (mass/inertia self-consistent)
  randomize_payload_com: true       # CoM += U(-3,+3) cm per axis: constant trim moment per episode
  randomize_actuators: true
  # wind-like held payload force (direct_rl parity): target resampled every 0.5 s, low-passed
  # (tau 0.25 s), HELD between resamples; ramped in late by the DR curriculum. 1 N sustained on a
  # 2 kg payload is a far stronger disturbance than the old one-step 3 N pulses (~0.03 N*s impulse);
  # direct_rl found 3 N sustained capped precision (within_10cm 0.50 -> 0.24).
  push_payload: true
  push_max_force: [1.0, 1.0, 1.0]
  payload_mass: 2.0
  payload_mass_range: 0.4
  payload_inertia_range: 0.4
  pos_max: 3.2
  # latency + sensor DR (sim-to-real): per-episode action/obs delays up to 30 ms, PX4 position-loop
  # feedback delay up to 20 ms + vicon noise; per-step obs noise + per-episode obs bias. Max delays
  # ramp in with the DR curriculum; noise/bias are always on. Cfg defaults; listed here for tuning.
  action_delay_steps_max: 3
  obs_delay_steps_max: 3
  ctrl_fb_delay_steps_max: 2
algo:
  num_envs: 512
  num_steps_per_env: 24
  # 1M PER-ENV control-step budget (= 41667 iter x 24), matching direct_rl's raised total_timesteps
  # (latency/noise DR + smoothness/CAPS regularizers need ~775k steps of refinement at full
  # difficulty). step_counter advances 24/iter (independent of num_envs); curriculum_steps=250k opens
  # the curriculum by ~25% of this budget. Aggregate samples ~= 512 x 1M = 0.51B transitions.
  max_iterations: 41667
  empirical_normalization: true
  obs_groups:
    actor: [policy]
    critic: [policy]
  policy:
    init_noise_std: 0.37
    actor_hidden_dims: [256, 256, 128]
    critic_hidden_dims: [256, 256, 128]
    activation: elu
    class_name: ActorCritic
  algorithm:
    # CapsPPO = PPO + CAPS spatial action-smoothness regularizer (Mysore 2021), ON by default.
    # lambda_s ramps 0 -> caps_lambda_s over [warmup_frac, full_frac] of training. direct_rl retuned
    # after full DR landed: lambda 0.5 over-regularized -> 0.2, sigma 0.25 -> 0.20, ramp 0.30-0.70.
    # max_action_std caps policy std near direct_rl max_log_std=-1.0 -> exp(-1)=0.368.
    # Set caps_lambda_s: 0.0 to fall back to plain PPO.
    class_name: unilab.algos.torch.caps_ppo:CapsPPO
    caps_lambda_s: 0.2
    caps_sigma: 0.20
    caps_warmup_frac: 0.30
    caps_full_frac: 0.70
    caps_total_iters: ${algo.max_iterations}
    max_action_std: 0.37
    learning_rate: 3.0e-4         # direct_rl: 1e-3 was prone to early instability (KLAdaptive there)
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    # direct_rl uses 0.002, but on skrl whose KLAdaptive lacks rsl_rl's hard 1e-5 LR floor. On rsl_rl,
    # 0.002 let std collapse to ~0.075 over the long run, inflating KL and pinning LR at 1e-5 for 7 h.
    # 0.003 keeps std nearer the 0.37 cap so KL stays bounded and LR stays healthy across the run.
    entropy_coef: 0.003
    value_loss_coef: 2.0
    desired_kl: 0.02              # raised threshold: adaptive LR only throttles above KL>0.04 (was 0.01)
    max_grad_norm: 1.0
    gamma: 0.99
    lam: 0.95
  save_interval: 100
reward:
  scales:
    pos: 2.0
    pos_fine: 0.3        # gentle no-deadband pull on the last cm (fixes the +6.6 cm settled z bias)
    progress: 10.0
    att: 0.5
    pl_vel: 0.25         # direct_rl retune (was 0.10): damps settled ~1.8 Hz payload swing
    pl_omega: 0.15       # direct_rl retune (was 0.05)
    taut: 2.0
    formation: 1.5       # direct_rl retune (was 1.0): payload tracking had won over formation shaping
    diag: 0.5            # explicit commanded-diagonal shaping on opposite drone pairs
    drone_upright: 0.05
    drone_omega: 0.005
    drone_vel: 0.03      # NEW: drone linear-velocity damping kills settled inter-drone hunting
    action: 0.02
    action_sat: 0.5      # pre-clip overshoot barrier; overshoot BOUNDED by sat_overshoot_clip
    smooth: 0.02
    smooth2: 0.01
    proximity: 100.0
    time_bonus: 5.0
    alive: 0.1
  crash_penalty: 10.0
  sigma_pos: 0.3
  pos_deadband: 0.04     # direct_rl A/B middle ground (0.05 smoothest / 0.02 most precise)
  sigma_pos_fine: 0.10
  sigma_form: 0.4
  sigma_diag: 0.30
